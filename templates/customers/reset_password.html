{% extends 'customers/base_customers.html' %}

{% block title %}Reset Password - Customer Portal{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1>Set New Password</h1>
        <p class="login-subtitle">Enter your new password below.</p>

        <form method="POST" action="{{ url_for('customers.reset_password', token=token) }}" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required autofocus minlength="8">
                <small style="color:var(--text-muted);">At least 8 characters</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
        </form>

        <div class="login-footer">
            <p><a href="{{ url_for('customers.login') }}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
