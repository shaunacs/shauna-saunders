{% extends 'customers/base_customers.html' %}

{% block title %}Forgot Password - Customer Portal{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1>Reset Your Password</h1>
        <p class="login-subtitle">Enter your email address and we'll send you a reset link.</p>

        <form method="POST" action="{{ url_for('customers.forgot_password') }}" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
        </form>

        <div class="login-footer">
            <p><a href="{{ url_for('customers.login') }}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
